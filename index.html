<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MX품목 시세조회</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#f4f6fa;--card:#fff;--ink:#141b2e;--mut:#828da3;--sub:#41506e;--line:#e4e8f0;--blue:#1f2b63;--up:#e63946;--down:#0a8f5b;--chipbg:#edeef4;--gold:#a06d0a}
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:'Noto Sans KR',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:1240px;margin:0 auto;padding:22px 20px 60px}
.top{display:flex;align-items:baseline;gap:9px;margin-bottom:4px;padding-left:12px}
.brandimg{height:26px;width:auto;display:block;align-self:center}
.brandtxt{display:flex;align-items:baseline;gap:9px}
.logo{color:#000;font-weight:700;font-size:20px;letter-spacing:2.5px;font-family:'Helvetica Neue',Arial,sans-serif}
.subbrand{color:#555;font-weight:500;font-size:14px;letter-spacing:0;margin-left:0;font-family:'Noto Sans KR',sans-serif}
h1{font-size:21px;font-weight:900;margin:0}
.sub{color:var(--mut);font-size:13px;margin:6px 0 20px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px;box-shadow:0 1px 10px rgba(20,40,120,.05)}
.kpi .t{color:var(--mut);font-size:12px;font-weight:500}.kpi .v{font-size:22px;font-weight:900;margin-top:5px}
.kpi .d{font-size:12px;margin-top:3px;font-weight:700}
.bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab{background:var(--card);border:1px solid var(--line);color:var(--sub);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer}
.tab.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.tab .c{opacity:.6;margin-left:5px;font-weight:500}
.grow{flex:1}
input,select{font-family:inherit;background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:8px 12px;font-size:13px}
.toggle{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.toggle button{border:0;background:var(--card);color:var(--sub);padding:8px 13px;font-size:13px;font-weight:700;cursor:pointer}
.toggle button.on{background:var(--blue);color:#fff}
.chartbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:22px;box-shadow:0 1px 10px rgba(20,40,120,.05)}
.chartbox .h{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.chartbox .h b{font-size:14px}
.hero{position:relative;border-radius:20px;overflow:hidden;margin-bottom:24px;background:radial-gradient(120% 120% at 62% 132%,#0a3a4d 0%,#04141c 46%,#02070c 100%);padding:30px 26px 14px;color:#fff;box-shadow:0 16px 40px rgba(20,40,120,.28)}
.storebg{position:absolute;inset:0;width:100%;height:100%;z-index:0;opacity:.92;pointer-events:none;filter:drop-shadow(0 0 2px rgba(120,235,255,.9)) drop-shadow(0 0 8px rgba(40,185,225,.55))}
.storephoto{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;z-index:0;opacity:.95;pointer-events:none;transform:translate(-2%,5%) scale(1.14)}
.heroveil{position:absolute;inset:0;z-index:0;pointer-events:none;background:linear-gradient(108deg,rgba(1,7,14,.62) 0%,rgba(1,7,14,.24) 40%,transparent 58%)}
.hero>.htag,.hero>p,.hero>.stat,.hero>.lineup{position:relative;z-index:1}
.hero::after{content:"";position:absolute;right:-80px;top:-80px;width:320px;height:320px;background:radial-gradient(circle,rgba(120,160,255,.45),transparent 60%);pointer-events:none}
.hero .htag{display:block;font-size:30px;font-weight:900;letter-spacing:.3px;color:#fff;margin:2px 0 2px;line-height:1.15}
.htag .mag{display:inline-block;vertical-align:-5px;margin-left:12px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.25));animation:magmove 2.8s ease-in-out infinite;transform-origin:center}
@keyframes magmove{0%{transform:translate(0,0) rotate(-9deg)}22%{transform:translate(7px,-4px) rotate(7deg)}45%{transform:translate(3px,5px) rotate(-5deg)}68%{transform:translate(-6px,-1px) rotate(9deg)}85%{transform:translate(-2px,3px) rotate(-3deg)}100%{transform:translate(0,0) rotate(-9deg)}}
.hero h2{font-size:26px;font-weight:900;margin:12px 0 0;letter-spacing:-.5px}
.hero p{margin:8px 0 0;font-size:13.5px;color:#d7e1ff;max-width:560px;line-height:1.5}
.hero .stat{margin-top:12px;display:flex;gap:18px;font-size:12px;color:#cdd9ff;font-weight:700;flex-wrap:wrap}
.hero .stat b{color:#fff;font-size:15px}
.orbit{position:absolute;top:0;right:0;width:340px;height:220px;z-index:2;pointer-events:none}
.ostage{position:absolute;right:265px;top:58px;width:0;height:0}
.olg{position:absolute;left:0;top:0;width:56px;height:56px;margin:-28px;border-radius:14px;display:flex;align-items:center;justify-content:center;opacity:0;background:#fff;box-shadow:0 9px 20px rgba(0,0,0,.42);overflow:hidden;will-change:transform,opacity}
.olg img{width:100%;height:100%;object-fit:cover;border-radius:16px;display:block}
.olg b{display:none;color:#fff;font-weight:900;font-size:10.5px;text-align:center;line-height:1.05;letter-spacing:-.3px}
.olg.fb{background:linear-gradient(150deg,var(--a),var(--b))}
.olg.fb img{display:none}.olg.fb b{display:flex;align-items:center;justify-content:center;width:100%;height:100%}
@media(max-width:900px){.orbit{display:none}}
.lineup{position:relative;z-index:1;display:flex;justify-content:center;gap:16px;margin-top:20px;overflow-x:auto;padding:14px 2px 6px}
.pod{flex:none;width:108px;cursor:pointer;text-align:center;transition:transform .22s cubic-bezier(.2,.7,.3,1)}
.pod:hover{transform:translateY(-11px) scale(1.06);z-index:2}
.pod .pic{position:relative;width:108px;height:108px;border-radius:20px;background:#fff;display:flex;align-items:center;justify-content:center;padding:13px;box-shadow:0 10px 22px rgba(0,0,0,.28);border:2px solid rgba(255,255,255,.7);transition:background .22s ease,border-color .22s ease,box-shadow .22s ease}
.pod:hover .pic{background:#eef0f6;border-color:#5b6488;box-shadow:0 20px 38px rgba(0,0,0,.4)}
.pod:hover .lb{color:#fff}
.pod:hover .lb small{color:#eaf0ff}
.pod .pic::after{content:"";position:absolute;inset:auto 0 -16px 0;height:22px;margin:0 14px;border-radius:50%;background:rgba(0,0,0,.22);filter:blur(7px);z-index:-1}
.pod .pic img{max-width:100%;max-height:100%;object-fit:contain}
.pod .lb{margin-top:14px;font-size:11.5px;font-weight:800;color:#fff}
.pod .lb small{display:block;font-weight:600;color:#b9c8f5;font-size:10px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:108px}
.pod:nth-child(odd){margin-top:14px}
@media(max-width:560px){.hero h2{font-size:21px}.pod,.pod .pic{width:88px}.pod .pic{height:88px}}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(218px,1fr));gap:16px}
.card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 1px 10px rgba(20,40,120,.05);transition:transform .22s cubic-bezier(.2,.7,.3,1),box-shadow .22s ease;display:flex;flex-direction:column;cursor:pointer;will-change:transform}
.card:hover{box-shadow:0 22px 44px rgba(15,22,45,.24);transform:translateY(-12px) scale(1.07);z-index:5;border-color:#aab2cc;background:#eef0f6}

.imgwrap{position:relative;height:152px;background:#fff;display:flex;align-items:center;justify-content:center;padding:14px;border-bottom:1px solid var(--line)}

.imgwrap .ph{color:#c4cee0;font-size:34px}
.chip{position:absolute;top:10px;left:10px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;background:var(--chipbg);color:var(--blue)}

.cbody{padding:12px 14px 14px;display:flex;flex-direction:column;gap:4px;flex:1}

.cprice{font-size:20px;font-weight:900;margin-top:2px}
.cmeta{font-size:11px;color:var(--mut)}

.more{font-size:11px;color:var(--blue);font-weight:700;margin-top:3px}
.up{color:var(--up)}.down{color:var(--down)}.flat{color:var(--mut)}
table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 1px 10px rgba(20,40,120,.05)}
th,td{padding:11px 13px;font-size:13px;text-align:left;border-bottom:1px solid var(--line)}

.hidden{display:none}

.modal{background:#fff;border-radius:18px;max-width:740px;width:100%;max-height:92vh;overflow:auto;box-shadow:0 20px 60px rgba(20,40,90,.3)}
.mhead{display:flex;gap:14px;padding:18px 20px 14px;border-bottom:1px solid var(--line);align-items:center;position:sticky;top:0;background:#fff;z-index:2}
.mhead img{width:62px;height:62px;object-fit:contain}
.mhead .ti{font-size:15px;font-weight:900}.mhead .ci{font-size:12px;color:var(--mut);margin-top:3px}
.mclose{margin-left:auto;border:0;background:#eef2fb;color:var(--sub);width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;flex:none}
.msum{display:flex;gap:8px;padding:12px 16px 0;flex-wrap:wrap}
.pill{font-size:11px;font-weight:700;padding:4px 9px;border-radius:8px;background:#f1f4fa;color:var(--sub)}
.pill b{color:var(--ink)}
.pill.dc{background:#fdeaec;color:var(--up)}
.benbox{margin:12px 16px 0;padding:11px 12px;border:1px dashed #d8b15a;background:#fdf6e6;border-radius:10px;display:flex;align-items:center;gap:8px;font-size:12.5px;color:#7a5a10}
.benbox b{font-size:14px;color:var(--gold)}
.mchart{margin:12px 16px 0;padding:10px 12px;border:1px solid var(--line);border-radius:10px}
.mchart .t{font-size:11px;color:var(--mut);margin-bottom:4px;font-weight:700}
.mtrend{margin:10px 16px 0;padding:10px 12px;border:1px solid var(--line);border-radius:10px}
.mtrend .tt{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.mtrend .tt b{font-size:13px}
.pseg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.pseg button{border:0;background:#fff;color:var(--sub);padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer}
.pseg button.on{background:var(--blue);color:#fff}
.pstat{display:flex;gap:8px;margin-bottom:8px}
.pstat .st{flex:1;background:#f7f9fc;border-radius:9px;padding:8px;text-align:center}
.pstat .st span{display:block;font-size:10px;color:var(--mut);font-weight:700;margin-bottom:2px}
.pstat .st b{font-size:13.5px}
.pstat .st.hi b{color:var(--up)}.pstat .st.lo b{color:var(--down)}
.note2{font-size:10px;color:var(--mut);margin-top:6px}
.mlist{padding:8px 16px 18px}
.mrow{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:12px;margin-top:10px;text-decoration:none;color:inherit;transition:.12s}
.mrow:hover{border-color:var(--blue);background:#f7f9ff}
.mrow .lw{width:80px;display:flex;align-items:center;flex:none}
.mrow .lw img{height:22px;max-width:80px;object-fit:contain}
.mrow .lw .nm{font-weight:800;font-size:12px}
.mrow .mid{flex:1;min-width:0}
.mrow .mn{font-size:12px;color:var(--sub);font-weight:700}
.mrow .bd{margin-top:3px;display:flex;gap:5px;flex-wrap:wrap}
.bdg{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;background:#eef2fb;color:var(--sub)}
.bdg.free{background:#e7f7ef;color:var(--down)}
.mrow .pr{font-weight:900;font-size:16px;flex:none}
.mrow.best{border-color:var(--blue);background:#f3f6ff}
.dcbase{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;cursor:pointer;padding:13px 12px;border:2px solid var(--blue);border-radius:13px;margin-top:10px;background:#eef2fb;box-shadow:0 3px 10px rgba(20,40,160,.1)}
.dcbase .lw{width:34px;flex:none;display:flex;align-items:center}
.dcbase .pr{font-weight:900;font-size:18px;color:var(--blue);flex:none}
.dcbase .mn{font-weight:800;font-size:13px}
.dcImg{width:24px;height:24px;border-radius:6px;object-fit:contain}
.cmpguide{display:block;font-size:11px;color:var(--sub);margin-top:3px;font-weight:600}
.cmpdiv{display:flex;align-items:center;gap:8px;margin:14px 2px 2px;color:var(--mut);font-size:11px;font-weight:800}
.cmpdiv::before,.cmpdiv::after{content:"";flex:1;height:1px;background:var(--line)}

.bestb{font-size:10px;font-weight:800;color:#fff;background:var(--up);border-radius:5px;padding:2px 6px;margin-left:6px}

(function(){var st=document.getElementById('ostage');if(!st||!Element.prototype.animate)return;
 var L=[].slice.call(st.querySelectorAll('.olg')),deg=function(d){return d*Math.PI/180;},T=0.5,RO=250;
 var P=function(b,a,r){return [Math.cos(deg(b+a))*r,Math.sin(deg(b+a))*r*T];};
 var VA=[0,620,1360,2100,2760,3080],VR=[96,74,50,28,13,5],VS=[1,1.03,1.06,1.02,.88,.7],VO=[0,0.31,0.38,0.44,0.50,0.56],DUR=9000;
 function form(i){return [(i-2.5)*70,0];}
 L.forEach(function(el,i){var e=+el.getAttribute('data-e'),sx=Math.cos(deg(e))*RO,sy=Math.sin(deg(e))*RO*0.8,base=i*80,g=form(i),gx=g[0],gy=g[1];
  var enS=0.02+i*0.03,enE=enS+0.11,settle=0.63+i*0.028;
  function tr(a,r,s){var p=P(base,a,r);return 'translate('+p[0]+'px,'+p[1]+'px) rotate('+a+'deg) scale('+s+')';}
  var kf=[
   {offset:0,transform:'translate('+sx+'px,'+sy+'px) rotate(760deg) scale(.2)',opacity:0,easing:'cubic-bezier(.3,.5,.4,1)'},
   {offset:enS,transform:'translate('+sx+'px,'+sy+'px) rotate(600deg) scale(.34)',opacity:0,easing:'cubic-bezier(.22,.68,.36,1)'},
   {offset:enE,transform:tr(VA[0],VR[0],VS[0]),opacity:1,easing:'linear'},
   {offset:VO[1],transform:tr(VA[1],VR[1],VS[1]),opacity:1,easing:'linear'},
   {offset:VO[2],transform:tr(VA[2],VR[2],VS[2]),opacity:1,easing:'linear'},
   {offset:VO[3],transform:tr(VA[3],VR[3],VS[3]),opacity:1,easing:'linear'},
   {offset:VO[4],transform:tr(VA[4],VR[4],VS[4]),opacity:1,easing:'linear'},
   {offset:VO[5],transform:tr(VA[5],VR[5],VS[5]),opacity:1,easing:'cubic-bezier(.35,0,.2,1)'},
   {offset:settle,transform:'translate('+gx+'px,'+gy+'px) rotate(0deg) scale(1)',opacity:1,easing:'cubic-bezier(.16,.9,.24,1)'},
   {offset:0.9,transform:'translate('+gx+'px,'+gy+'px) rotate(0deg) scale(1)',opacity:1,easing:'ease-in'},
   {offset:1,transform:'translate('+(sx*0.6)+'px,'+(sy*0.6)+'px) rotate(-420deg) scale(.24)',opacity:0}
  ];
  el.animate(kf,{duration:DUR,iterations:Infinity});});
})();
